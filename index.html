<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Workout Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --border: #252525;
    --accent: #e8f542;
    --accent2: #42c8f5;
    --red: #f55442;
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 100px;
  }

  /* TOP NAV */
  .top-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-nav h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.06em;
    color: var(--accent);
  }

  .top-nav .date {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* BOTTOM TAB BAR */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }

  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 4px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }

  .tab-btn .icon { font-size: 1.2rem; }
  .tab-btn.active { color: var(--accent); }

  /* SCREENS */
  .screen { display: none; padding: 16px 16px 0; }
  .screen.active { display: block; }

  /* DAY SELECTOR */
  .day-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .day-selector::-webkit-scrollbar { display: none; }

  .day-pill {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .day-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* EXERCISE CARDS */
  .ex-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .ex-card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .ex-card-name {
    font-weight: 600;
    font-size: 0.92rem;
  }

  .ex-card-type {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .ex-target {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
    margin-left: 8px;
  }

  /* SET ROWS */
  .set-rows { padding: 8px 16px 4px; }

  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .set-row:last-child { border-bottom: none; }

  .set-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--muted);
    text-align: center;
  }

  .set-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 8px 10px;
    width: 100%;
    text-align: center;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }

  .set-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .set-input::placeholder { color: var(--muted2); font-weight: 300; }

  .set-check {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .set-check.done {
    background: var(--accent);
    border-color: var(--accent);
  }

  .set-labels {
    display: grid;
    grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px;
    padding: 6px 0 2px;
  }

  .set-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: center;
  }

  .add-set-btn {
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px;
    cursor: pointer;
    border-top: 1px solid var(--border);
    transition: color 0.2s;
  }

  .add-set-btn:active { color: var(--accent); }

  /* NOTES */
  .notes-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    padding: 10px 12px;
    width: 100%;
    resize: none;
    height: 64px;
    margin: 8px 16px;
    width: calc(100% - 32px);
  }

  .notes-area:focus { outline: none; border-color: var(--accent2); }
  .notes-area::placeholder { color: var(--muted2); }

  /* SAVE BUTTON */
  .save-btn {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 448px;
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    border: none;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    z-index: 150;
    transition: opacity 0.2s;
  }

  .save-btn:active { opacity: 0.8; }

  /* HISTORY SCREEN */
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.88rem;
    font-weight: 300;
  }

  .history-empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

  .history-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .history-entry-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .history-entry-header.open { border-bottom-color: var(--border); }

  .history-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
  }

  .history-day-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .badge-a { background: #2a1f00; color: var(--accent); border: 1px solid var(--accent); }
  .badge-b { background: #001f2a; color: var(--accent2); border: 1px solid var(--accent2); }
  .badge-c { background: #2a0000; color: var(--red); border: 1px solid var(--red); }

  .history-body { display: none; padding: 12px 16px; }
  .history-body.open { display: block; }

  .history-ex { margin-bottom: 12px; }
  .history-ex-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
  .history-sets { display: flex; flex-wrap: wrap; gap: 6px; }

  .history-set-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.78rem;
    color: #c0c0c0;
  }

  .history-set-chip.done { border-color: var(--accent); color: var(--accent); }

  .history-note {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    font-weight: 300;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .history-actions { display: flex; gap: 8px; margin-top: 10px; }

  .delete-btn, .edit-btn {
    background: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .delete-btn { border: 1px solid var(--muted2); color: var(--muted); }
  .delete-btn:active { border-color: var(--red); color: var(--red); }
  .edit-btn { border: 1px solid var(--accent); color: var(--accent); font-weight: 500; }
  .edit-btn:active { background: #2a2a00; }

  .last-session {
    padding: 6px 16px 4px;
    font-size: 0.72rem;
    color: var(--accent2);
    font-weight: 300;
    font-style: italic;
    border-bottom: 1px solid var(--border);
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--accent);
    color: #000;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SECTION HEADER */
  .section-head {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    padding: 4px 0 8px;
  }

  .week-indicator {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .week-indicator .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .week-indicator .value { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--accent); letter-spacing: 0.04em; }
  .week-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.72rem;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="top-nav">
  <h1>Workout Log</h1>
  <div class="date" id="todayDate"></div>
</div>

<div class="toast" id="toast"></div>

<!-- LOG SCREEN -->
<div class="screen active" id="screen-log">

  <div class="day-selector" id="daySelector">
    <div class="day-pill active" onclick="selectDay('A')" id="pill-A">Day A — Push</div>
    <div class="day-pill" onclick="selectDay('B')" id="pill-B">Day B — Pull</div>
    <div class="day-pill" onclick="selectDay('C')" id="pill-C">Day C — Power</div>
  </div>

  <div class="week-indicator" id="weekIndicator" style="display:none">
    <div>
      <div class="label">Power Day Focus</div>
      <div class="value" id="weekFocusLabel">Week Odd — Deadlift Heavy</div>
    </div>
    <button class="week-toggle" onclick="toggleWeek()">Switch</button>
  </div>

  <div id="exerciseArea"></div>

</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div id="historyList"></div>
</div>

<!-- TAB BAR -->
<button class="save-btn" id="saveBtn" onclick="saveWorkout()">Save Workout</button>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('log')" id="tab-log">
    <span class="icon">📋</span>Log
  </button>
  <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
    <span class="icon">📅</span>History
  </button>
</div>

<script>
const DAYS = {
  A: {
    label: 'Day A — Push',
    exercises: [
      { name: 'Bench Press', target: '4 × 6', type: 'Main', sets: 4 },
      { name: 'Overhead Press', target: '3 × 8', type: 'Main', sets: 3 },
      { name: 'Close-Grip Bench', target: '3 × 10', type: 'Accessory', sets: 3 },
      { name: 'Front Raise', target: '3 × 12', type: 'Accessory', sets: 3 },
      { name: 'Push-Ups', target: '2 × 15', type: 'Finisher', sets: 2 },
    ]
  },
  B: {
    label: 'Day B — Pull',
    exercises: [
      { name: 'Barbell Row', target: '4 × 6', type: 'Main', sets: 4 },
      { name: 'Pull-Ups / Chin-Ups', target: '3 × 6–8', type: 'Main', sets: 3 },
      { name: 'Barbell Curl', target: '3 × 10', type: 'Accessory', sets: 3 },
      { name: 'Rear Delt Row', target: '3 × 15', type: 'Accessory', sets: 3 },
      { name: 'Barbell Shrug', target: '3 × 12', type: 'Accessory', sets: 3 },
    ]
  },
  C: {
    label: 'Day C — Power',
    exercises: {
      odd: [
        { name: 'Deadlift (Heavy)', target: '4 × 4', type: 'Main', sets: 4 },
        { name: 'Back Squat (Moderate)', target: '3 × 5', type: 'Main', sets: 3 },
        { name: 'Romanian Deadlift', target: '3 × 8', type: 'Accessory', sets: 3 },
        { name: 'KB Swings', target: '3 × 15', type: 'Accessory', sets: 3 },
        { name: 'Farmer / Suitcase Carry', target: '3 × 20yd', type: 'Finisher', sets: 3 },
      ],
      even: [
        { name: 'Back Squat (Heavy)', target: '4 × 4', type: 'Main', sets: 4 },
        { name: 'Deadlift (Moderate)', target: '3 × 5', type: 'Main', sets: 3 },
        { name: 'Romanian Deadlift', target: '3 × 8', type: 'Accessory', sets: 3 },
        { name: 'KB Swings', target: '3 × 15', type: 'Accessory', sets: 3 },
        { name: 'Farmer / Suitcase Carry', target: '3 × 20yd', type: 'Finisher', sets: 3 },
      ]
    }
  }
};

let currentDay = 'A';
let currentWeek = 'odd'; // 'odd' or 'even'
let logState = {}; // { exName: { sets: [{weight, reps, done}], note } }

function getExercises(day) {
  if (day !== 'C') return DAYS[day].exercises;
  return DAYS.C.exercises[currentWeek];
}

function selectDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(`pill-${day}`).classList.add('active');
  document.getElementById('weekIndicator').style.display = day === 'C' ? 'flex' : 'none';
  document.getElementById('saveBtn').style.display = 'block';
  renderExercises();
}

function toggleWeek() {
  currentWeek = currentWeek === 'odd' ? 'even' : 'odd';
  document.getElementById('weekFocusLabel').textContent =
    currentWeek === 'odd' ? 'Week Odd — Deadlift Heavy' : 'Week Even — Squat Heavy';
  renderExercises();
}

function getLastSession(exName) {
  // Find most recent history entry (not current edit) that has this exercise
  const history = getHistory();
  for (const entry of history) {
    if (editingId && entry.id === editingId) continue;
    const ex = entry.exercises.find(e => e.name === exName);
    if (ex) return ex;
  }
  return null;
}

function getState(exName, sets) {
  if (!logState[exName]) {
    logState[exName] = {
      sets: Array.from({length: sets}, () => ({ weight: '', reps: '', done: false })),
      note: ''
    };
  }
  return logState[exName];
}

function renderExercises() {
  const area = document.getElementById('exerciseArea');
  const exercises = getExercises(currentDay);
  area.innerHTML = '';

  exercises.forEach(ex => {
    const state = getState(ex.name, ex.sets);
    const last = getLastSession(ex.name);
    const card = document.createElement('div');
    card.className = 'ex-card';

    // Build last session hint line
    let lastHint = '';
    if (last) {
      const summary = last.sets
        .filter(s => s.weight)
        .map(s => `${s.weight}lb×${s.reps || '?'}`)
        .join(', ');
      if (summary) {
        lastHint = `<div class="last-session">Last: ${summary}</div>`;
      }
    }

    let setsHTML = `
      <div class="set-rows">
        <div class="set-labels">
          <div class="set-label"></div>
          <div class="set-label">Weight (lb)</div>
          <div class="set-label">Reps</div>
          <div class="set-label"></div>
        </div>
    `;

    state.sets.forEach((s, i) => {
      // Suggested weight: use last session's weight for this set index if current is empty
      const lastSetWeight = last && last.sets[i] ? last.sets[i].weight : '';
      const placeholder = lastSetWeight ? `${lastSetWeight}` : 'lbs';
      const inputStyle = !s.weight && lastSetWeight ? 'color: var(--muted); font-style: italic;' : '';

      setsHTML += `
        <div class="set-row" id="setrow-${ex.name}-${i}">
          <div class="set-num">${i+1}</div>
          <input class="set-input" type="number" inputmode="decimal"
            placeholder="${placeholder}" style="${inputStyle}"
            value="${s.weight}" onchange="updateSet('${ex.name}', ${i}, 'weight', this.value)" />
          <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
            value="${s.reps}" onchange="updateSet('${ex.name}', ${i}, 'reps', this.value)" />
          <button class="set-check ${s.done ? 'done' : ''}" onclick="toggleDone('${ex.name}', ${i}, this)">
            ${s.done ? '✓' : ''}
          </button>
        </div>
      `;
    });

    setsHTML += `</div>
      <button class="add-set-btn" onclick="addSet('${ex.name}', '${ex.target}')">+ Add Set</button>`;

    card.innerHTML = `
      <div class="ex-card-header">
        <div>
          <div class="ex-card-name">${ex.name}</div>
          <div class="ex-card-type">${ex.type}</div>
        </div>
        <div class="ex-target">${ex.target}</div>
      </div>
      ${lastHint}
      ${setsHTML}
      <textarea class="notes-area" placeholder="Notes…" onchange="updateNote('${ex.name}', this.value)">${state.note}</textarea>
    `;

    area.appendChild(card);
  });
}

function updateSet(exName, idx, field, val) {
  logState[exName].sets[idx][field] = val;
}

function updateNote(exName, val) {
  logState[exName].note = val;
}

function toggleDone(exName, idx, btn) {
  logState[exName].sets[idx].done = !logState[exName].sets[idx].done;
  btn.classList.toggle('done');
  btn.textContent = logState[exName].sets[idx].done ? '✓' : '';
}

function addSet(exName) {
  logState[exName].sets.push({ weight: '', reps: '', done: false });
  renderExercises();
}

let editingId = null;

// ── Supabase config ──────────────────────────────────────────────
const SUPABASE_URL = 'https://dsnpizvjwaransbuitqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbnBpenZqd2FyYW5zYnVpdHFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NjYzMzUsImV4cCI6MjA5OTA0MjMzNX0.Z3ceRThdf0ZUNzvfQhLUggo9T64mF5g05ND84WXFlgY';
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

async function dbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: HEADERS,
    ...options
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function getHistory() {
  try {
    return await dbFetch('workouts?order=created_at.desc');
  } catch(e) {
    console.error('Failed to load history', e);
    return [];
  }
}

async function loadForEdit(id) {
  const history = await getHistory();
  const entry = history.find(e => e.id === id);
  if (!entry) return;

  editingId = id;
  currentDay = entry.day;
  if (entry.week) currentWeek = entry.week;

  logState = {};
  entry.exercises.forEach(ex => {
    logState[ex.name] = { sets: ex.sets.map(s => ({...s})), note: ex.note || '' };
  });

  switchTab('log');
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(`pill-${currentDay}`).classList.add('active');
  document.getElementById('weekIndicator').style.display = currentDay === 'C' ? 'flex' : 'none';
  if (currentDay === 'C') {
    document.getElementById('weekFocusLabel').textContent =
      currentWeek === 'odd' ? 'Week Odd — Deadlift Heavy' : 'Week Even — Squat Heavy';
  }

  renderExercises();
  document.getElementById('saveBtn').textContent = 'Update Workout';
  showToast('Loaded for editing');
}

async function saveWorkout() {
  const exercises = getExercises(currentDay);
  const saved = [];

  exercises.forEach(ex => {
    const state = logState[ex.name];
    if (!state) return;
    const filledSets = state.sets.filter(s => s.weight || s.reps);
    if (filledSets.length === 0) return;
    saved.push({ name: ex.name, sets: state.sets, note: state.note });
  });

  if (saved.length === 0) {
    showToast('Log at least one set first');
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  try {
    if (editingId) {
      await dbFetch(`workouts?id=eq.${editingId}`, {
        method: 'PATCH',
        body: JSON.stringify({
          day: currentDay,
          week: currentDay === 'C' ? currentWeek : null,
          exercises: saved
        })
      });
      editingId = null;
      btn.textContent = 'Save Workout';
      showToast('Workout updated ✓');
    } else {
      await dbFetch('workouts', {
        method: 'POST',
        body: JSON.stringify({
          day: currentDay,
          week: currentDay === 'C' ? currentWeek : null,
          exercises: saved
        })
      });
      showToast('Workout saved ✓');
    }
  } catch(e) {
    showToast('Save failed — check connection');
    console.error(e);
  } finally {
    btn.disabled = false;
    if (!editingId) btn.textContent = 'Save Workout';
  }

  logState = {};
  renderExercises();
}

async function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = `<div class="history-empty"><div class="icon">⏳</div>Loading…</div>`;

  const history = await getHistory();

  if (history.length === 0) {
    list.innerHTML = `<div class="history-empty"><div class="icon">📭</div>No workouts logged yet.<br>Complete your first session to see it here.</div>`;
    return;
  }

  list.innerHTML = history.map((entry, idx) => {
    const badgeClass = `badge-${entry.day.toLowerCase()}`;
    const dayLabel = entry.day === 'C' && entry.week
      ? `Day C · ${entry.week === 'odd' ? 'DL Heavy' : 'SQ Heavy'}`
      : `Day ${entry.day}`;

    const dateStr = new Date(entry.date || entry.created_at).toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric'
    });

    const exHTML = entry.exercises.map(ex => {
      const setsHTML = ex.sets.map((s, i) => {
        if (!s.weight && !s.reps) return '';
        const label = [s.weight ? `${s.weight}lb` : '', s.reps ? `×${s.reps}` : ''].filter(Boolean).join(' ');
        return `<div class="history-set-chip ${s.done ? 'done' : ''}">${i+1}. ${label}</div>`;
      }).join('');

      return `<div class="history-ex">
        <div class="history-ex-name">${ex.name}</div>
        <div class="history-sets">${setsHTML}</div>
        ${ex.note ? `<div class="history-note">${ex.note}</div>` : ''}
      </div>`;
    }).join('');

    return `
      <div class="history-entry">
        <div class="history-entry-header" onclick="toggleHistory(${idx}, this)">
          <div>
            <div class="history-date">${dateStr}</div>
          </div>
          <div class="history-day-badge ${badgeClass}">${dayLabel}</div>
        </div>
        <div class="history-body" id="hbody-${idx}">
          ${exHTML}
          <div class="history-actions">
            <button class="edit-btn" onclick="loadForEdit('${entry.id}')">✎ Edit</button>
            <button class="delete-btn" onclick="deleteEntry('${entry.id}')">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleHistory(idx, header) {
  const body = document.getElementById(`hbody-${idx}`);
  body.classList.toggle('open');
  header.classList.toggle('open');
}

async function deleteEntry(id) {
  try {
    await dbFetch(`workouts?id=eq.${id}`, { method: 'DELETE' });
    renderHistory();
  } catch(e) {
    showToast('Delete failed');
    console.error(e);
  }
}

async function getLastSession(exName) {
  try {
    const history = await getHistory();
    for (const entry of history) {
      if (editingId && entry.id === editingId) continue;
      const ex = entry.exercises.find(e => e.name === exName);
      if (ex) return ex;
    }
  } catch(e) {}
  return null;
}

async function renderExercises() {
  const area = document.getElementById('exerciseArea');
  const exercises = getExercises(currentDay);
  area.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem;">Loading…</div>';

  // Fetch all last sessions in parallel
  const lastSessions = await Promise.all(exercises.map(ex => getLastSession(ex.name)));

  area.innerHTML = '';

  exercises.forEach((ex, exIdx) => {
    const state = getState(ex.name, ex.sets);
    const last = lastSessions[exIdx];
    const card = document.createElement('div');
    card.className = 'ex-card';

    let lastHint = '';
    if (last) {
      const summary = last.sets
        .filter(s => s.weight)
        .map(s => `${s.weight}lb×${s.reps || '?'}`)
        .join(', ');
      if (summary) {
        lastHint = `<div class="last-session">Last: ${summary}</div>`;
      }
    }

    let setsHTML = `
      <div class="set-rows">
        <div class="set-labels">
          <div class="set-label"></div>
          <div class="set-label">Weight (lb)</div>
          <div class="set-label">Reps</div>
          <div class="set-label"></div>
        </div>
    `;

    state.sets.forEach((s, i) => {
      const lastSetWeight = last && last.sets[i] ? last.sets[i].weight : '';
      const placeholder = lastSetWeight ? `${lastSetWeight}` : 'lbs';
      const inputStyle = !s.weight && lastSetWeight ? 'color: var(--muted); font-style: italic;' : '';

      setsHTML += `
        <div class="set-row" id="setrow-${ex.name.replace(/\s/g,'_')}-${i}">
          <div class="set-num">${i+1}</div>
          <input class="set-input" type="number" inputmode="decimal"
            placeholder="${placeholder}" style="${inputStyle}"
            value="${s.weight}" onchange="updateSet('${ex.name}', ${i}, 'weight', this.value)" />
          <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
            value="${s.reps}" onchange="updateSet('${ex.name}', ${i}, 'reps', this.value)" />
          <button class="set-check ${s.done ? 'done' : ''}" onclick="toggleDone('${ex.name}', ${i}, this)">
            ${s.done ? '✓' : ''}
          </button>
        </div>
      `;
    });

    setsHTML += `</div>
      <button class="add-set-btn" onclick="addSet('${ex.name}')">+ Add Set</button>`;

    card.innerHTML = `
      <div class="ex-card-header">
        <div>
          <div class="ex-card-name">${ex.name}</div>
          <div class="ex-card-type">${ex.type}</div>
        </div>
        <div class="ex-target">${ex.target}</div>
      </div>
      ${lastHint}
      ${setsHTML}
      <textarea class="notes-area" placeholder="Notes…" onchange="updateNote('${ex.name}', this.value)">${state.note}</textarea>
    `;

    area.appendChild(card);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById('saveBtn').style.display = tab === 'log' ? 'block' : 'none';
  if (tab === 'history') renderHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
selectDay('A');
</script>
