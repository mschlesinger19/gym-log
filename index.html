<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Workout Log</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --border: #252525;
    --accent: #e8f542;
    --accent2: #42c8f5;
    --red: #f55442;
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 100px;
  }

  .top-nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-nav h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.06em; color: var(--accent); }
  .top-nav .date { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 200;
  }
  .tab-btn {
    flex: 1; background: none; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.65rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 10px 4px 14px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.2s;
  }
  .tab-btn .icon { font-size: 1.2rem; }
  .tab-btn.active { color: var(--accent); }

  .screen { display: none; padding: 16px 16px 0; }
  .screen.active { display: block; }

  .day-selector {
    display: flex; gap: 8px; margin-bottom: 20px;
    overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;
  }
  .day-selector::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; padding: 8px 18px;
    font-size: 0.8rem; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .day-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }

  .ex-card-header {
    padding: 12px 16px 10px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .ex-card-name { font-weight: 600; font-size: 0.92rem; }
  .ex-card-type { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .ex-target { font-size: 0.72rem; color: var(--accent); font-weight: 600; text-align: right; white-space: nowrap; margin-left: 8px; }

  /* Equipment toggle */
  .equip-toggle {
    display: flex; gap: 0; padding: 8px 16px; border-bottom: 1px solid var(--border);
  }
  .equip-btn {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; font-weight: 500; padding: 6px 8px;
    cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .equip-btn:first-child { border-radius: 6px 0 0 6px; }
  .equip-btn:last-child { border-radius: 0 6px 6px 0; margin-left: -1px; }
  .equip-btn.active { background: var(--card); color: var(--text); border: 2px solid var(--accent); z-index: 1; position: relative; }

  /* Suggestion bar */
  .suggestion-bar {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .suggestion-text { font-size: 0.78rem; color: var(--accent2); font-weight: 400; }
  .suggestion-text span { font-weight: 600; color: var(--accent); }

  /* Plate calculator */
  .plate-calc {
    padding: 8px 16px 10px; border-bottom: 1px solid var(--border);
    background: #111;
  }
  .plate-calc-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .plate-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .plate-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 9px;
    font-size: 0.78rem; font-weight: 600; color: var(--text);
  }
  .plate-chip.p45 { border-color: #f55442; color: #f55442; }
  .plate-chip.p35 { border-color: #f5a342; color: #f5a342; }
  .plate-chip.p25 { border-color: #42c8f5; color: #42c8f5; }
  .plate-chip.p10 { border-color: #a3f542; color: #a3f542; }
  .plate-chip.p5  { border-color: #e8f542; color: #e8f542; }
  .plate-chip.p2h { border-color: #888; color: #aaa; }
  .plate-none { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  .last-session {
    padding: 6px 16px 4px; font-size: 0.72rem;
    color: var(--muted); font-weight: 300; font-style: italic;
    border-bottom: 1px solid var(--border);
  }

  .set-rows { padding: 8px 16px 4px; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px; align-items: center; padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .set-row:last-child { border-bottom: none; }
  .set-num { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--muted); text-align: center; }
  .set-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500; padding: 8px 10px;
    width: 100%; text-align: center; -webkit-appearance: none; transition: border-color 0.15s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted2); font-weight: 300; }
  .set-labels { display: grid; grid-template-columns: 28px 1fr 1fr auto; gap: 8px; padding: 6px 0 2px; }
  .set-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-align: center; }
  .set-check {
    width: 32px; height: 32px; border-radius: 50%; border: 2px solid #555;
    background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; transition: all 0.2s; flex-shrink: 0; color: #555;
  }
  .set-check:active { border-color: var(--accent); }
  .set-check.done { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  .add-set-btn {
    width: 100%; background: none; border: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em; padding: 10px; cursor: pointer;
    border-top: 1px solid var(--border); transition: color 0.2s;
  }
  .add-set-btn:active { color: var(--accent); }

  .notes-area {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 300; padding: 10px 12px;
    resize: none; height: 64px; margin: 8px 16px; width: calc(100% - 32px);
  }
  .notes-area:focus { outline: none; border-color: var(--accent2); }
  .notes-area::placeholder { color: var(--muted2); }

  .save-btn {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 32px); max-width: 448px;
    background: var(--accent); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.08em;
    border: none; border-radius: 12px; padding: 16px; cursor: pointer; z-index: 150;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.8; }
  .save-btn:disabled { opacity: 0.5; }

  /* History */
  .history-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .history-tab {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; text-align: center;
    font-size: 0.75rem; font-weight: 500; color: var(--muted);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.2s;
  }
  .history-tab.active { border-color: var(--accent); color: var(--accent); }

  .history-panel { display: none; }
  .history-panel.active { display: block; }

  .history-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.88rem; font-weight: 300; }
  .history-empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

  .history-entry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .history-entry-header {
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  .history-entry-header.open { border-bottom-color: var(--border); }
  .history-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.05em; }
  .history-day-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.06em; }
  .badge-a { background: #2a1f00; color: var(--accent); border: 1px solid var(--accent); }
  .badge-b { background: #001f2a; color: var(--accent2); border: 1px solid var(--accent2); }
  .badge-c { background: #2a0000; color: var(--red); border: 1px solid var(--red); }
  .badge-d { background: #0a1f0a; color: #42f57e; border: 1px solid #42f57e; }
  .history-body { display: none; padding: 12px 16px; }
  .history-body.open { display: block; }
  .history-ex { margin-bottom: 12px; }
  .history-ex-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
  .history-sets { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-set-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; color: #c0c0c0; }
  .history-set-chip.done { border-color: var(--accent); color: var(--accent); }
  .history-note { font-size: 0.8rem; color: var(--muted); font-style: italic; font-weight: 300; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .history-actions { display: flex; gap: 8px; margin-top: 10px; }
  .delete-btn, .edit-btn {
    background: none; border-radius: 6px; font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; padding: 6px 12px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .delete-btn { border: 1px solid var(--muted2); color: var(--muted); }
  .delete-btn:active { border-color: var(--red); color: var(--red); }
  .edit-btn { border: 1px solid var(--accent); color: var(--accent); font-weight: 500; }
  .edit-btn:active { background: #2a2a00; }

  /* Progress charts */
  .progress-lift-selector {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  }
  .lift-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 14px;
    font-size: 0.75rem; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .lift-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .chart-container {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 12px; }
  .chart-empty { text-align: center; padding: 30px; color: var(--muted); font-size: 0.82rem; }

  .week-indicator {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
    display: none; align-items: center; justify-content: space-between;
  }
  .week-indicator .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .week-indicator .value { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--accent); letter-spacing: 0.04em; }
  .week-toggle {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 0.72rem; padding: 4px 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.05em;
  }

  .toast {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--accent); color: #000;
    font-weight: 600; font-size: 0.82rem; letter-spacing: 0.04em;
    padding: 10px 20px; border-radius: 100px;
    opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="top-nav">
  <h1>Workout Log</h1>
  <div class="date" id="todayDate"></div>
</div>

<div class="toast" id="toast"></div>

<!-- LOG SCREEN -->
<div class="screen active" id="screen-log">
  <div class="day-selector" id="daySelector">
    <div class="day-pill active" onclick="selectDay('A')" id="pill-A">Day A — Push</div>
    <div class="day-pill" onclick="selectDay('B')" id="pill-B">Day B — Pull</div>
    <div class="day-pill" onclick="selectDay('C')" id="pill-C">Day C — Power</div>
    <div class="day-pill" onclick="selectDay('D')" id="pill-D">Day D — Core</div>
  </div>
  <div class="week-indicator" id="weekIndicator">
    <div>
      <div class="label">Power Day Focus</div>
      <div class="value" id="weekFocusLabel">Week Odd — Deadlift Heavy</div>
    </div>
    <button class="week-toggle" onclick="toggleWeek()">Switch</button>
  </div>
  <div id="exerciseArea"></div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div class="history-tabs">
    <div class="history-tab active" onclick="switchHistoryTab('log')">Session Log</div>
    <div class="history-tab" onclick="switchHistoryTab('progress')">Progress</div>
  </div>
  <div class="history-panel active" id="panel-log">
    <div id="historyList"></div>
  </div>
  <div class="history-panel" id="panel-progress">
    <div class="progress-lift-selector" id="liftSelector"></div>
    <div class="chart-container">
      <div class="chart-title" id="chartTitle">Select a lift</div>
      <canvas id="progressChart" height="200"></canvas>
      <div class="chart-empty" id="chartEmpty" style="display:none"></div>
    </div>
  </div>
</div>

<button class="save-btn" id="saveBtn" onclick="saveWorkout()">Save Workout</button>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('log')" id="tab-log">
    <span class="icon">📋</span>Log
  </button>
  <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
    <span class="icon">📅</span>History
  </button>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://dsnpizvjwaransbuitqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbnBpenZqd2FyYW5zYnVpdHFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NjYzMzUsImV4cCI6MjA5OTA0MjMzNX0.Z3ceRThdf0ZUNzvfQhLUggo9T64mF5g05ND84WXFlgY';
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

// Plate rack
const RACK = [45, 35, 25, 10, 5, 5, 5, 5, 2.5, 2.5];
const BAR_WEIGHT = 45;

// Lifts that auto-progress +5lb
const PROGRESSIVE_LIFTS = ['Bench Press', 'Overhead Press', 'Barbell Row', 'Back Squat (Heavy)', 'Back Squat (Moderate)', 'Deadlift (Heavy)', 'Deadlift (Moderate)', 'Romanian Deadlift'];

// Lifts that are "heavy" versions and drive moderate calc
const HEAVY_TO_MODERATE = {
  'Back Squat (Moderate)': 'Back Squat (Heavy)',
  'Deadlift (Moderate)': 'Deadlift (Heavy)'
};

// Main lifts for progress chart
const MAIN_LIFTS = ['Bench Press', 'Overhead Press', 'Barbell Row', 'Back Squat (Heavy)', 'Deadlift (Heavy)', 'Romanian Deadlift'];

// ── Program ──────────────────────────────────────────────────────
const DAYS = {
  A: {
    label: 'Day A — Push',
    exercises: [
      { name: 'Bench Press',       target: '4 × 6',  type: 'Main',      sets: 4 },
      { name: 'Overhead Press',    target: '3 × 8',  type: 'Main',      sets: 3 },
      { name: 'Close-Grip Bench',  target: '3 × 10', type: 'Accessory', sets: 3 },
      { name: 'Front Raise',       target: '3 × 12', type: 'Accessory', sets: 3 },
      { name: 'Push-Ups',          target: '2 × 15', type: 'Finisher',  sets: 2 },
    ]
  },
  B: {
    label: 'Day B — Pull',
    exercises: [
      { name: 'Barbell Row',       target: '4 × 6',  type: 'Main',      sets: 4 },
      { name: 'Pull-Ups / Chin-Ups', target: '3 × 6–8', type: 'Main',  sets: 3 },
      { name: 'Barbell Curl',      target: '3 × 10', type: 'Accessory', sets: 3 },
      { name: 'Face Pulls',        target: '3 × 15', type: 'Accessory', sets: 3 },
      { name: 'Barbell Shrug',     target: '3 × 12', type: 'Accessory', sets: 3 },
    ]
  },
  C: {
    exercises: {
      odd: [
        { name: 'Deadlift (Heavy)',        target: '4 × 4', type: 'Main',      sets: 4 },
        { name: 'Back Squat (Moderate)',   target: '3 × 5', type: 'Main',      sets: 3 },
        { name: 'Romanian Deadlift',       target: '3 × 8', type: 'Accessory', sets: 3 },
        { name: 'KB Swings',               target: '3 × 15',type: 'Accessory', sets: 3 },
        { name: 'Farmer / Suitcase Carry', target: '3 × 20yd', type: 'Finisher', sets: 3 },
      ],
      even: [
        { name: 'Back Squat (Heavy)',      target: '4 × 4', type: 'Main',      sets: 4 },
        { name: 'Deadlift (Moderate)',     target: '3 × 5', type: 'Main',      sets: 3 },
        { name: 'Romanian Deadlift',       target: '3 × 8', type: 'Accessory', sets: 3 },
        { name: 'KB Swings',               target: '3 × 15',type: 'Accessory', sets: 3 },
        { name: 'Farmer / Suitcase Carry', target: '3 × 20yd', type: 'Finisher', sets: 3 },
      ]
    }
  },
  D: {
    label: 'Day D — Core',
    exercises: [
      // Circuit 1
      { name: 'Dead Bugs',          target: '2–3 × 10/side', type: 'Circuit 1', sets: 3, inputType: 'per_side' },
      { name: 'Forearm Plank',      target: '2–3 × 30–45s',  type: 'Circuit 1', sets: 3, inputType: 'timed' },
      { name: 'Bird Dogs',          target: '2–3 × 8/side',  type: 'Circuit 1', sets: 3, inputType: 'per_side' },
      // Circuit 2
      { name: 'Hollow Body Hold',   target: '2–3 × 20–30s',  type: 'Circuit 2', sets: 3, inputType: 'timed' },
      { name: 'Side Plank',         target: '2–3 × 30s/side',type: 'Circuit 2', sets: 3, inputType: 'timed_per_side' },
      { name: 'Russian Twists',     target: '2–3 × 15/side', type: 'Circuit 2', sets: 3, inputType: 'per_side' },
      // Optional loaded
      { name: 'Pallof Press',       target: '2–3 × 10/side', type: 'Optional', sets: 3, inputType: 'per_side' },
      { name: 'Decline Sit-Ups',    target: '2–3 × 12',      type: 'Optional', sets: 3, inputType: 'weight_reps' },
    ]
  }
};

// ── State ────────────────────────────────────────────────────────
let currentDay = 'A';
let currentWeek = 'odd';
let logState = {};
let equipState = {}; // { exName: 'barbell' | 'dumbbell' }
let editingId = null;
let historyCache = null;
let progressChart = null;
let selectedLift = MAIN_LIFTS[0];

// ── Supabase ─────────────────────────────────────────────────────
async function dbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: HEADERS, ...options });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function getHistory(force = false) {
  if (historyCache && !force) return historyCache;
  try {
    historyCache = await dbFetch('workouts?order=created_at.desc');
    return historyCache;
  } catch(e) { console.error('Failed to load history', e); return []; }
}

// ── Plate Calculator ─────────────────────────────────────────────
function calcPlates(totalWeight) {
  const perSide = (totalWeight - BAR_WEIGHT) / 2;
  if (perSide <= 0) return [];
  let remaining = perSide;
  const used = [];
  const available = [...RACK].sort((a,b) => b - a);
  for (const plate of available) {
    if (remaining <= 0) break;
    if (plate <= remaining + 0.01) {
      used.push(plate);
      remaining -= plate;
      remaining = Math.round(remaining * 100) / 100;
    }
  }
  return used;
}

function renderPlates(plates) {
  if (!plates.length) return `<span class="plate-none">Bar only</span>`;
  const colorClass = { 45:'p45', 35:'p35', 25:'p25', 10:'p10', 5:'p5', 2.5:'p2h' };
  return plates.map(p => `<div class="plate-chip ${colorClass[p] || ''}">${p}</div>`).join('');
}

// ── Weight Suggestion ─────────────────────────────────────────────
async function getSuggestedWeight(exName, lastSession) {
  // Check if this is a moderate lift driven by a heavy lift
  const heavyName = HEAVY_TO_MODERATE[exName];
  if (heavyName) {
    // Find most recent session where the heavy version was logged
    const history = await getHistory();
    for (const entry of history) {
      if (editingId && entry.id === editingId) continue;
      const heavyEx = entry.exercises.find(e => e.name === heavyName);
      if (heavyEx) {
        const heavyWeights = heavyEx.sets.filter(s => s.weight).map(s => parseFloat(s.weight));
        if (heavyWeights.length) {
          const maxHeavy = Math.max(...heavyWeights);
          return Math.round(maxHeavy * 0.70 / 5) * 5; // 70%, rounded to nearest 5
        }
      }
    }
    return null;
  }

  if (!lastSession || !PROGRESSIVE_LIFTS.includes(exName)) return null;

  const allDone = lastSession.sets.every(s => s.done);
  const weights = lastSession.sets.filter(s => s.weight).map(s => parseFloat(s.weight));
  if (!weights.length) return null;
  const lastWeight = Math.max(...weights);
  return allDone ? lastWeight + 5 : lastWeight;
}

// ── Program Helpers ───────────────────────────────────────────────
function getExercises(day) {
  if (day === 'C') return DAYS.C.exercises[currentWeek];
  return DAYS[day].exercises;
}

function getState(exName, sets, inputType) {
  if (!logState[exName]) {
    const blankSet = inputType === 'timed' ? { duration: '', done: false }
      : inputType === 'per_side' ? { reps: '', done: false }
      : inputType === 'timed_per_side' ? { duration: '', done: false }
      : { weight: '', reps: '', done: false };
    logState[exName] = { sets: Array.from({length: sets}, () => ({...blankSet})), note: '' };
  }
  return logState[exName];
}

function getEquip(exName) {
  return equipState[exName] || 'barbell';
}

// ── Render Exercises ──────────────────────────────────────────────
async function renderExercises() {
  const area = document.getElementById('exerciseArea');
  const exercises = getExercises(currentDay);
  area.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem;">Loading…</div>';

  const history = await getHistory();

  // Get last session for each exercise
  const lastSessions = exercises.map(ex => {
    for (const entry of history) {
      if (editingId && entry.id === editingId) continue;
      const found = entry.exercises.find(e => e.name === ex.name);
      if (found) return found;
    }
    return null;
  });

  // Get suggestions
  const suggestions = await Promise.all(exercises.map((ex, i) => getSuggestedWeight(ex.name, lastSessions[i])));

  area.innerHTML = '';

  exercises.forEach((ex, exIdx) => {
    const inputType = ex.inputType || 'weight_reps';
    const isCore = inputType !== 'weight_reps';
    const state = getState(ex.name, ex.sets, inputType);
    const last = lastSessions[exIdx];
    const suggested = suggestions[exIdx];
    const equip = getEquip(ex.name);
    const isBarbell = equip === 'barbell';

    const card = document.createElement('div');
    card.className = 'ex-card';
    card.id = `excard-${ex.name.replace(/[^a-z0-9]/gi,'_')}`;

    // Last session hint
    let lastHint = '';
    if (last && !isCore) {
      const summary = last.sets.filter(s => s.weight).map(s => `${s.weight}lb×${s.reps||'?'}`).join(', ');
      if (summary) lastHint = `<div class="last-session">Last: ${summary}</div>`;
    } else if (last && isCore) {
      const summary = last.sets.map(s => {
        if (s.duration) return `${s.duration}s`;
        if (s.reps) return `${s.reps}/side`;
        return null;
      }).filter(Boolean).join(', ');
      if (summary) lastHint = `<div class="last-session">Last: ${summary}</div>`;
    }

    // Suggestion bar (weight-based lifts only)
    let suggBar = '';
    if (suggested !== null && !isCore) {
      const isModerate = !!HEAVY_TO_MODERATE[ex.name];
      const label = isModerate
        ? `Moderate target (70%): <span>${suggested} lb</span>`
        : (last && last.sets.every(s => s.done)
            ? `Last session complete → <span>${suggested} lb</span>`
            : `Same as last → <span>${suggested} lb</span>`);
      suggBar = `<div class="suggestion-bar"><div class="suggestion-text">${label}</div></div>`;
    }

    // Plate calc (barbell only, non-core)
    let plateSection = '';
    if (isBarbell && suggested !== null && !isCore) {
      const plates = calcPlates(suggested);
      plateSection = `<div class="plate-calc">
        <div class="plate-calc-label">Plates per side (suggested)</div>
        <div class="plate-chips">${renderPlates(plates)}</div>
      </div>`;
    }

    // Equipment toggle (non-core only)
    const equipToggle = isCore ? '' : `<div class="equip-toggle">
      <button class="equip-btn ${isBarbell ? 'active' : ''}" onclick="setEquip('${ex.name}', 'barbell')">🏋️ Barbell</button>
      <button class="equip-btn ${!isBarbell ? 'active' : ''}" onclick="setEquip('${ex.name}', 'dumbbell')">💪 Dumbbell</button>
    </div>`;

    // Sets — render based on inputType
    let setsHTML = '';
    if (inputType === 'timed') {
      setsHTML = `<div class="set-rows">
        <div class="set-labels">
          <div class="set-label"></div>
          <div class="set-label" style="grid-column:span 2">Duration (sec)</div>
          <div class="set-label"></div>
        </div>`;
      state.sets.forEach((s, i) => {
        const lastDur = last?.sets[i]?.duration || '';
        setsHTML += `<div class="set-row">
          <div class="set-num">${i+1}</div>
          <input class="set-input" type="number" inputmode="numeric" placeholder="${lastDur || 'sec'}"
            value="${s.duration||''}" onchange="updateSet('${ex.name}', ${i}, 'duration', this.value)"
            style="grid-column:span 2" />
          <button class="set-check ${s.done ? 'done' : ''}" onclick="toggleDone('${ex.name}', ${i}, this)">${s.done ? '✓' : ''}</button>
        </div>`;
      });
    } else if (inputType === 'timed_per_side') {
      setsHTML = `<div class="set-rows">
        <div class="set-labels">
          <div class="set-label"></div>
          <div class="set-label" style="grid-column:span 2">Duration/side (sec)</div>
          <div class="set-label"></div>
        </div>`;
      state.sets.forEach((s, i) => {
        const lastDur = last?.sets[i]?.duration || '';
        setsHTML += `<div class="set-row">
          <div class="set-num">${i+1}</div>
          <input class="set-input" type="number" inputmode="numeric" placeholder="${lastDur || 'sec'}"
            value="${s.duration||''}" onchange="updateSet('${ex.name}', ${i}, 'duration', this.value)"
            style="grid-column:span 2" />
          <button class="set-check ${s.done ? 'done' : ''}" onclick="toggleDone('${ex.name}', ${i}, this)">${s.done ? '✓' : ''}</button>
        </div>`;
      });
    } else if (inputType === 'per_side') {
      setsHTML = `<div class="set-rows">
        <div class="set-labels">
          <div class="set-label"></div>
          <div class="set-label" style="grid-column:span 2">Reps / side</div>
          <div class="set-label"></div>
        </div>`;
      state.sets.forEach((s, i) => {
        const lastReps = last?.sets[i]?.reps || '';
        setsHTML += `<div class="set-row">
          <div class="set-num">${i+1}</div>
          <input class="set-input" type="number" inputmode="numeric" placeholder="${lastReps || 'reps'}"
            value="${s.reps||''}" onchange="updateSet('${ex.name}', ${i}, 'reps', this.value)"
            style="grid-column:span 2" />
          <button class="set-check ${s.done ? 'done' : ''}" onclick="toggleDone('${ex.name}', ${i}, this)">${s.done ? '✓' : ''}</button>
        </div>`;
      });
    } else {
      // Standard weight × reps
      setsHTML = `<div class="set-rows">
        <div class="set-labels">
          <div class="set-label"></div>
          <div class="set-label">Weight (lb)</div>
          <div class="set-label">Reps</div>
          <div class="set-label"></div>
        </div>`;
      state.sets.forEach((s, i) => {
        const ph = suggested !== null ? `${suggested}` : (last && last.sets[i]?.weight ? `${last.sets[i].weight}` : 'lbs');
        setsHTML += `<div class="set-row">
          <div class="set-num">${i+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="${ph}"
            value="${s.weight}" onchange="updateSet('${ex.name}', ${i}, 'weight', this.value);updatePlateDisplay('${ex.name}')" />
          <input class="set-input" type="number" inputmode="numeric" placeholder="reps"
            value="${s.reps}" onchange="updateSet('${ex.name}', ${i}, 'reps', this.value)" />
          <button class="set-check ${s.done ? 'done' : ''}" onclick="toggleDone('${ex.name}', ${i}, this)">${s.done ? '✓' : ''}</button>
        </div>`;
      });
    }

    setsHTML += `</div><button class="add-set-btn" onclick="addSet('${ex.name}', '${inputType}')">+ Add Set</button>`;

    card.innerHTML = `
      <div class="ex-card-header">
        <div><div class="ex-card-name">${ex.name}</div><div class="ex-card-type">${ex.type}</div></div>
        <div class="ex-target">${ex.target}</div>
      </div>
      ${equipToggle}
      ${lastHint}
      ${suggBar}
      ${plateSection}
      ${setsHTML}
      <textarea class="notes-area" placeholder="Notes…" onchange="updateNote('${ex.name}', this.value)">${state.note}</textarea>
    `;

    area.appendChild(card);
  });
}

function updatePlateDisplay(exName) {
  // Recalc plates based on first filled weight input
  const card = document.getElementById(`excard-${exName.replace(/[^a-z0-9]/gi,'_')}`);
  if (!card) return;
  const plateChips = card.querySelector('.plate-chips');
  if (!plateChips) return;
  const inputs = card.querySelectorAll('.set-input');
  let w = 0;
  for (const inp of inputs) { if (inp.value) { w = parseFloat(inp.value); break; } }
  if (w > 0) plateChips.innerHTML = renderPlates(calcPlates(w));
}

function setEquip(exName, equip) {
  equipState[exName] = equip;
  renderExercises();
}

function updateSet(exName, idx, field, val) { logState[exName].sets[idx][field] = val; }
function updateNote(exName, val) { logState[exName].note = val; }

function toggleDone(exName, idx, btn) {
  logState[exName].sets[idx].done = !logState[exName].sets[idx].done;
  btn.classList.toggle('done');
  btn.textContent = logState[exName].sets[idx].done ? '✓' : '';
}

function addSet(exName, inputType) {
  const blankSet = inputType === 'timed' ? { duration: '', done: false }
    : inputType === 'per_side' ? { reps: '', done: false }
    : inputType === 'timed_per_side' ? { duration: '', done: false }
    : { weight: '', reps: '', done: false };
  logState[exName].sets.push({...blankSet});
  renderExercises();
}

// ── Day / Week ────────────────────────────────────────────────────
function selectDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(`pill-${day}`).classList.add('active');
  const wi = document.getElementById('weekIndicator');
  wi.style.display = day === 'C' ? 'flex' : 'none';
  document.getElementById('saveBtn').style.display = 'block';
  renderExercises();
}

function toggleWeek() {
  currentWeek = currentWeek === 'odd' ? 'even' : 'odd';
  document.getElementById('weekFocusLabel').textContent =
    currentWeek === 'odd' ? 'Week Odd — Deadlift Heavy' : 'Week Even — Squat Heavy';
  renderExercises();
}

// ── Save / Edit ───────────────────────────────────────────────────
async function saveWorkout() {
  const exercises = getExercises(currentDay);
  const saved = [];
  exercises.forEach(ex => {
    const state = logState[ex.name];
    if (!state) return;
    if (!state.sets.some(s => s.weight || s.reps || s.duration)) return;
    saved.push({ name: ex.name, sets: state.sets, note: state.note, equip: getEquip(ex.name) });
  });
  if (!saved.length) { showToast('Log at least one set first'); return; }

  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    if (editingId) {
      await dbFetch(`workouts?id=eq.${editingId}`, {
        method: 'PATCH',
        body: JSON.stringify({ day: currentDay, week: currentDay === 'C' ? currentWeek : null, exercises: saved })
      });
      editingId = null;
      btn.textContent = 'Save Workout';
      showToast('Workout updated ✓');
    } else {
      await dbFetch('workouts', {
        method: 'POST',
        body: JSON.stringify({ day: currentDay, week: currentDay === 'C' ? currentWeek : null, exercises: saved })
      });
      showToast('Workout saved ✓');
    }
    historyCache = null;
  } catch(e) {
    showToast('Save failed — check connection'); console.error(e);
  } finally {
    btn.disabled = false;
    if (!editingId) btn.textContent = 'Save Workout';
  }
  logState = {}; renderExercises();
}

async function loadForEdit(id) {
  const history = await getHistory();
  const entry = history.find(e => e.id === id);
  if (!entry) return;
  editingId = id;
  currentDay = entry.day;
  if (entry.week) currentWeek = entry.week;
  logState = {};
  entry.exercises.forEach(ex => {
    logState[ex.name] = { sets: ex.sets.map(s => ({...s})), note: ex.note || '' };
    if (ex.equip) equipState[ex.name] = ex.equip;
  });
  switchTab('log');
  document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(`pill-${currentDay}`).classList.add('active');
  document.getElementById('weekIndicator').style.display = currentDay === 'C' ? 'flex' : 'none';
  if (currentDay === 'C') {
    document.getElementById('weekFocusLabel').textContent =
      currentWeek === 'odd' ? 'Week Odd — Deadlift Heavy' : 'Week Even — Squat Heavy';
  }
  renderExercises();
  document.getElementById('saveBtn').textContent = 'Update Workout';
  showToast('Loaded for editing');
}

// ── History ───────────────────────────────────────────────────────
let historyTabActive = 'log';

function switchHistoryTab(tab) {
  historyTabActive = tab;
  document.querySelectorAll('.history-tab').forEach((t,i) => {
    t.classList.toggle('active', (i === 0 && tab === 'log') || (i === 1 && tab === 'progress'));
  });
  document.getElementById('panel-log').classList.toggle('active', tab === 'log');
  document.getElementById('panel-progress').classList.toggle('active', tab === 'progress');
  if (tab === 'progress') renderProgress();
}

async function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = `<div class="history-empty"><div class="icon">⏳</div>Loading…</div>`;
  const history = await getHistory(true);

  if (!history.length) {
    list.innerHTML = `<div class="history-empty"><div class="icon">📭</div>No workouts logged yet.</div>`;
    return;
  }

  list.innerHTML = history.map((entry, idx) => {
    const badgeClass = `badge-${entry.day.toLowerCase()}`;
    const dayLabel = entry.day === 'C' && entry.week
      ? `Day C · ${entry.week === 'odd' ? 'DL Heavy' : 'SQ Heavy'}`
      : `Day ${entry.day}`;
    const dateStr = new Date(entry.created_at).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

    const exHTML = entry.exercises.map(ex => {
      const setsHTML = ex.sets.map((s,i) => {
        let label = '';
        if (s.duration) label = `${s.duration}s`;
        else if (s.weight || s.reps) label = [s.weight ? `${s.weight}lb` : '', s.reps ? `×${s.reps}` : ''].filter(Boolean).join(' ');
        if (!label) return '';
        return `<div class="history-set-chip ${s.done ? 'done' : ''}">${i+1}. ${label}</div>`;
      }).join('');
      return `<div class="history-ex">
        <div class="history-ex-name">${ex.name}${ex.equip === 'dumbbell' ? ' <span style="color:var(--muted);font-size:0.7rem">(DB)</span>' : ''}</div>
        <div class="history-sets">${setsHTML}</div>
        ${ex.note ? `<div class="history-note">${ex.note}</div>` : ''}
      </div>`;
    }).join('');

    return `<div class="history-entry">
      <div class="history-entry-header" onclick="toggleHistory(${idx}, this)">
        <div><div class="history-date">${dateStr}</div></div>
        <div class="history-day-badge ${badgeClass}">${dayLabel}</div>
      </div>
      <div class="history-body" id="hbody-${idx}">
        ${exHTML}
        <div class="history-actions">
          <button class="edit-btn" onclick="loadForEdit('${entry.id}')">✎ Edit</button>
          <button class="delete-btn" onclick="deleteEntry('${entry.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleHistory(idx, header) {
  document.getElementById(`hbody-${idx}`).classList.toggle('open');
  header.classList.toggle('open');
}

async function deleteEntry(id) {
  try {
    await dbFetch(`workouts?id=eq.${id}`, { method: 'DELETE' });
    historyCache = null;
    renderHistory();
  } catch(e) { showToast('Delete failed'); }
}

// ── Progress Charts ───────────────────────────────────────────────
async function renderProgress() {
  const history = await getHistory();

  // Build lift selector
  const sel = document.getElementById('liftSelector');
  sel.innerHTML = MAIN_LIFTS.map(l =>
    `<div class="lift-pill ${l === selectedLift ? 'active' : ''}" onclick="selectLift('${l}')">${l}</div>`
  ).join('');

  drawChart(history);
}

function selectLift(lift) {
  selectedLift = lift;
  document.querySelectorAll('.lift-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === lift);
  });
  getHistory().then(h => drawChart(h));
}

function drawChart(history) {
  const title = document.getElementById('chartTitle');
  const empty = document.getElementById('chartEmpty');
  const canvas = document.getElementById('progressChart');

  title.textContent = selectedLift;

  // Extract data points — max weight per session
  const points = [];
  [...history].reverse().forEach(entry => {
    const ex = entry.exercises.find(e => e.name === selectedLift);
    if (!ex) return;
    const weights = ex.sets.filter(s => s.weight && s.done).map(s => parseFloat(s.weight));
    if (!weights.length) return;
    points.push({
      date: new Date(entry.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric' }),
      weight: Math.max(...weights)
    });
  });

  if (!points.length) {
    canvas.style.display = 'none';
    empty.style.display = 'block';
    empty.textContent = 'No data yet for this lift.';
    return;
  }

  canvas.style.display = 'block';
  empty.style.display = 'none';

  if (progressChart) progressChart.destroy();

  progressChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: points.map(p => p.date),
      datasets: [{
        label: 'Top Weight (lb)',
        data: points.map(p => p.weight),
        borderColor: '#e8f542',
        backgroundColor: 'rgba(232,245,66,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#e8f542',
        pointRadius: 4,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c1c1c',
          titleColor: '#e8f542',
          bodyColor: '#f0f0f0',
          borderColor: '#252525',
          borderWidth: 1
        }
      },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1a1a1a' } },
        y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1a1a1a' } }
      }
    }
  });
}

// ── Tab Switching ─────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById('saveBtn').style.display = tab === 'log' ? 'block' : 'none';
  if (tab === 'history') renderHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────────
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
selectDay('A');

// Register service worker for PWA caching
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/gym-log/sw.js')
      .then(reg => {
        // Auto-update: when a new SW is waiting, activate it
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });
  });
}
</script>
